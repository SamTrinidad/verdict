services:
  # ── PHP-FPM application ─────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    image: verdict-app
    restart: unless-stopped
    env_file: .env
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      # Preserve image-built assets when source directory is mounted
      - verdict_public_build:/var/www/html/public/build
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - verdict

  # ── Nginx reverse proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - .:/var/www/html:ro
      - verdict_public_build:/var/www/html/public/build:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
      - reverb
    networks:
      - verdict

  # ── Laravel Reverb WebSocket server (same image as app) ─────────────────────
  reverb:
    image: verdict-app
    restart: unless-stopped
    env_file: .env
    working_dir: /var/www/html
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8080", "--no-interaction"]
    volumes:
      - .:/var/www/html
      - verdict_public_build:/var/www/html/public/build
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - verdict

  # ── Queue worker (same image as app) ────────────────────────────────────────
  worker:
    image: verdict-app
    restart: unless-stopped
    env_file: .env
    working_dir: /var/www/html
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--no-interaction"]
    volumes:
      - .:/var/www/html
      - verdict_public_build:/var/www/html/public/build
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - verdict

  # ── MySQL 8.0 ───────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-verdict}
      MYSQL_USER: ${DB_USERNAME:-verdict}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - verdict

  # ── Redis 7 ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - verdict

  # ── Mailpit (dev mail catcher) ───────────────────────────────────────────────
  mailpit:
    image: axllent/mailpit
    restart: unless-stopped
    ports:
      - "${MAIL_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"
    networks:
      - verdict

volumes:
  mysql_data:
  redis_data:
  # Named volume holds image-built assets; survives source-code volume mounts
  verdict_public_build:

networks:
  verdict:
    driver: bridge
