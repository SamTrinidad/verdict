server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php;

    charset utf-8;
    client_max_body_size 64m;

    # Docker's embedded DNS — re-resolves service names dynamically so nginx
    # never caches a stale IP after a container is recreated.
    resolver 127.0.0.11 valid=30s ipv6=off;

    # ── Static files & Laravel front-controller ───────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── Laravel Reverb WebSocket proxy ────────────────────────────────────────
    location /app/ {
        # Variable forces nginx to use the resolver above on every request
        set $reverb_upstream http://reverb:8080;
        proxy_pass $reverb_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 60s;
    }

    # ── PHP-FPM ───────────────────────────────────────────────────────────────
    location ~ \.php$ {
        # Variable forces nginx to use the resolver above on every request,
        # so it re-resolves "app" after container recreations.
        set $fpm_upstream app:9000;
        fastcgi_pass $fpm_upstream;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
    }

    # ── Block dotfiles (except Let's Encrypt) ─────────────────────────────────
    location ~ /\.(?!well-known).* {
        deny all;
    }

    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
}
